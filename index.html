<!-- ===== File Upload Box (Replace your current submitFile() with this) ===== -->
<div id="fileUploadBox">
  <input type="file" id="fileInput">
  <button onclick="submitFile()">Send</button>
</div>

<script>
let uploadedFiles = JSON.parse(localStorage.getItem("uploadedFiles") || "[]");

// New submitFile function
function submitFile() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        // Save file metadata + base64 content
        uploadedFiles.push({
            from: currentUser,
            name: file.name,
            data: e.target.result
        });
        localStorage.setItem("uploadedFiles", JSON.stringify(uploadedFiles));

        // Show a clickable link in commander notifications
        if (currentUser === "HEADSWATCOMMANDER") {
            const box = document.getElementById("commanderNotifications");
            const link = document.createElement("a");
            link.href = e.target.result;
            link.download = file.name;
            link.innerText = `Download ${file.name}`;
            link.style.display = "block";
            link.style.color = "#00ff66";
            box.appendChild(link);
        }

        fileInput.value = ""; // reset input
        document.getElementById("fileUploadBox").style.display = "none";
        showCommanderNotifications();
    };
    reader.readAsDataURL(file);
}

// Modify showCommanderNotifications to display clickable downloads
function showCommanderNotifications(){
    let box = document.getElementById("commanderNotifications");
    if(currentUser!=="HEADSWATCOMMANDER"){
        box.innerHTML="";
        return;
    }

    box.innerHTML="<h3>Commander Notifications</h3>";

    if(!crimeReports.length && !uploadedFiles.length && !officerMessages.length){
        box.innerHTML+="<p>No new notifications</p>";
        return;
    }

    if(crimeReports.length){
        box.innerHTML+="<p><strong>Crime Reports</strong></p><ul>";
        crimeReports.forEach((r,i)=>{
            box.innerHTML+=`<li>${r.from}: ${r.text} <button onclick="ackCrime(${i})">Mark Read</button></li>`;
        });
        box.innerHTML+="</ul>";
    }

    if(uploadedFiles.length){
        box.innerHTML+="<p><strong>Files</strong></p>";
        uploadedFiles.forEach((f,i)=>{
            const link = document.createElement("a");
            link.href = f.data;
            link.download = f.name;
            link.innerText = `${f.from}: ${f.name}`;
            link.style.display = "block";
            link.style.color = "#00ff66";
            box.appendChild(link);
        });
    }

    if(officerMessages.length){
        box.innerHTML+="<p><strong>Officer Messages</strong></p><ul>";
        officerMessages.forEach((m,i)=>{
            box.innerHTML+=`<li>${m.from}: ${m.text} <button onclick="ackMessage(${i})">Mark Read</button></li>`;
        });
        box.innerHTML+="</ul>";
    }
}
</script>
